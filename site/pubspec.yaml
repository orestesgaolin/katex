name: site
description: A three-way KaTeX comparison site (KaTeX JS / katex Dart SVG / katex_flutter).
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.11.0

dependencies:
  jaspr: ^0.23.1
  katex:
    path: ../packages/katex
  universal_web: ^1.1.1

dev_dependencies:
  build_runner: ^2.10.0
  build_web_compilers: ^4.8.0
  jaspr_builder: ^0.23.1
  lints: ^5.0.0

jaspr:
  mode: static
