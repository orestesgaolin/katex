name: site
description: A three-way KaTeX comparison site (KaTeX JS / katex Dart SVG / katex_flutter).
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  jaspr: ^0.23.1
  jaspr_flutter_embed: ^0.4.11
  jaspr_router: ^0.8.2
  katex:
    path: ../packages/katex
  katex_flutter:
    path: ../packages/katex_flutter
  universal_web: ^1.1.1

dev_dependencies:
  build_runner: ^2.10.0
  build_web_compilers: ^4.8.0
  flutter_test:
    sdk: flutter
  jaspr_builder: ^0.23.1
  lints: ^5.0.0

jaspr:
  mode: static
  # Port for the static-build crawl server (default 8080 is often taken).
  port: 8092
  flutter: embedded

flutter:
  uses-material-design: true
