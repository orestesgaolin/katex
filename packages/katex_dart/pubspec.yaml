name: katex_dart
description: A pure-Dart port of KaTeX. Parses LaTeX math to a backend-agnostic box tree and serializes it to SVG — no Flutter dependency.
version: 0.1.0
repository: https://github.com/orestesgaolin/katex/tree/main/packages/katex_dart
homepage: https://github.com/orestesgaolin/katex
issue_tracker: https://github.com/orestesgaolin/katex/issues
topics:
  - latex
  - katex
  - math
  - svg
  - rendering

environment:
  sdk: ^3.11.0

dependencies:
  args: ^2.4.0
  meta: ^1.15.0

dev_dependencies:
  path: ^1.9.0
  test: ^1.25.0
  very_good_analysis: ^7.0.0
  xml: ^6.5.0
