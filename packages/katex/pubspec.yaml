name: katex
description: A pure-Dart port of KaTeX — parse LaTeX math to a backend-agnostic box tree and serialize to SVG, with no Flutter dependency.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.11.0

dependencies:
  args: ^2.4.0
  meta: ^1.15.0

dev_dependencies:
  path: ^1.9.0
  test: ^1.25.0
  very_good_analysis: ^7.0.0
  xml: ^6.5.0
