name: katex_flutter
description: A Flutter widget that renders LaTeX math by painting the backend-agnostic box tree from the pure-Dart katex package. KaTeX in Flutter.
version: 0.1.0
repository: https://github.com/orestesgaolin/katex/tree/main/packages/katex_flutter
homepage: https://github.com/orestesgaolin/katex
issue_tracker: https://github.com/orestesgaolin/katex/issues
topics:
  - latex
  - katex
  - math
  - widget
# NOTE: `katex_flutter` is already taken on pub.dev (an established 4.x package).
# Publishing requires renaming first. Kept unpublished; depends on the sibling
# `katex` via path within this monorepo.
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  katex:
    path: ../katex

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  # KaTeX glyph fonts (SIL OFL), copied from packages/katex/assets/fonts into
  # this package's fonts/ dir so Flutter bundles them. Family names match
  # KatexFont.cssFamily ("KaTeX_<Family>") so the painter can select them.
  # Resolve with package: 'katex_flutter' (see lib/src/font_mapping.dart).
  # Each font FILE is declared under its OWN unique family (the filename stem,
  # e.g. KaTeX_Math-Italic) with NO weight/style descriptors. KaTeX's italic
  # and bold fonts bake the slant/weight into the glyph OUTLINES but leave the
  # files internally flagged "Regular" (italicAngle 0, no italic/bold bits).
  # If we used one family per group + `style: italic`/`weight: 700`, Skia would
  # add SYNTHETIC oblique/bold on top of the already-styled outlines (double
  # slant). Selecting the exact file by family + normal style avoids that,
  # matching the SVG/KaTeX rendering. See font_mapping.textStyleFor.
  fonts:
    - family: KaTeX_Main-Regular
      fonts:
        - asset: fonts/KaTeX_Main-Regular.ttf
    - family: KaTeX_Main-Bold
      fonts:
        - asset: fonts/KaTeX_Main-Bold.ttf
    - family: KaTeX_Main-Italic
      fonts:
        - asset: fonts/KaTeX_Main-Italic.ttf
    - family: KaTeX_Main-BoldItalic
      fonts:
        - asset: fonts/KaTeX_Main-BoldItalic.ttf
    - family: KaTeX_Math-Italic
      fonts:
        - asset: fonts/KaTeX_Math-Italic.ttf
    - family: KaTeX_Math-BoldItalic
      fonts:
        - asset: fonts/KaTeX_Math-BoldItalic.ttf
    - family: KaTeX_AMS-Regular
      fonts:
        - asset: fonts/KaTeX_AMS-Regular.ttf
    - family: KaTeX_Size1-Regular
      fonts:
        - asset: fonts/KaTeX_Size1-Regular.ttf
    - family: KaTeX_Size2-Regular
      fonts:
        - asset: fonts/KaTeX_Size2-Regular.ttf
    - family: KaTeX_Size3-Regular
      fonts:
        - asset: fonts/KaTeX_Size3-Regular.ttf
    - family: KaTeX_Size4-Regular
      fonts:
        - asset: fonts/KaTeX_Size4-Regular.ttf
    - family: KaTeX_Caligraphic-Regular
      fonts:
        - asset: fonts/KaTeX_Caligraphic-Regular.ttf
    - family: KaTeX_Caligraphic-Bold
      fonts:
        - asset: fonts/KaTeX_Caligraphic-Bold.ttf
    - family: KaTeX_Fraktur-Regular
      fonts:
        - asset: fonts/KaTeX_Fraktur-Regular.ttf
    - family: KaTeX_Fraktur-Bold
      fonts:
        - asset: fonts/KaTeX_Fraktur-Bold.ttf
    - family: KaTeX_SansSerif-Regular
      fonts:
        - asset: fonts/KaTeX_SansSerif-Regular.ttf
    - family: KaTeX_SansSerif-Bold
      fonts:
        - asset: fonts/KaTeX_SansSerif-Bold.ttf
    - family: KaTeX_SansSerif-Italic
      fonts:
        - asset: fonts/KaTeX_SansSerif-Italic.ttf
    - family: KaTeX_Script-Regular
      fonts:
        - asset: fonts/KaTeX_Script-Regular.ttf
    - family: KaTeX_Typewriter-Regular
      fonts:
        - asset: fonts/KaTeX_Typewriter-Regular.ttf
